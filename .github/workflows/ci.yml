name: Shmuki Talk CI

on:
  push:
    branches: [ main, develop, "claude/**" ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Analysis & Tests
  # ──────────────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Create firebase_options.dart
        run: |
          cat > lib/core/config/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart';
          import 'package:flutter/foundation.dart';
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform => web;
            static const FirebaseOptions web = FirebaseOptions(
              apiKey: 'CI_TEST_KEY',
              appId: '1:000000:web:000000',
              messagingSenderId: '000000',
              projectId: 'test-project',
            );
            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'CI_TEST_KEY',
              appId: '1:000000:android:000000',
              messagingSenderId: '000000',
              projectId: 'test-project',
            );
            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'CI_TEST_KEY',
              appId: '1:000000:ios:000000',
              messagingSenderId: '000000',
              projectId: 'test-project',
              iosClientId: 'CLIENT_ID',
              iosBundleId: 'com.shmuki.talk',
            );
            static const FirebaseOptions macos = FirebaseOptions(
              apiKey: 'CI_TEST_KEY',
              appId: '1:000000:ios:000000',
              messagingSenderId: '000000',
              projectId: 'test-project',
              iosClientId: 'CLIENT_ID',
              iosBundleId: 'com.shmuki.talk',
            );
          }
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-warnings

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # Build Android
  # ──────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Firebase Options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > lib/core/config/firebase_options.dart

      - name: Setup Google Services
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Build AAB (release)
        if: github.ref == 'refs/heads/main'
        env:
          KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PATH: android/app/upload-keystore.jks
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/app/upload-keystore.jks
          echo "storePassword=$KEY_STORE_PASSWORD" >> android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
          flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shmuki-talk-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Upload AAB artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: shmuki-talk-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Build Web
  # ──────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Setup Firebase Options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > lib/core/config/firebase_options.dart

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --pwa-strategy offline-first

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: shmuki-talk-web
          path: build/web/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy Web to Firebase Hosting
  # ──────────────────────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: shmuki-talk-web
          path: build/web/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
