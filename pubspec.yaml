name: shmuki_talk
description: Shmuki Talk - Private real-time walkie-talkie for families and friends
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_app_check: ^0.3.1+3

  # Authentication
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.3.0

  # WebRTC
  flutter_webrtc: ^0.11.2

  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.4.2
  share_plus: ^10.0.2
  vibration: ^2.0.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.3
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  connectivity_plus: ^6.0.5
  app_badge_plus: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik-Regular.ttf
        - asset: assets/fonts/Rubik-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rubik-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rubik-Light.ttf
          weight: 300
